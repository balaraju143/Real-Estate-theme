<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Stackly | Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!--==================================
    LOGIN
    ===================================-->

    <section class="login-section">

        <div class="login-container">

            <!--=========================
            LOGO
            =========================-->

            <a href="index.html" class="login-logo">

                <img src="images/stackly-logo5.webp" alt="Stackly Logo">

            </a>

            <!--=========================
            HEADER
            =========================-->

            <div class="login-header">

                <span class="login-tag">

                    ACCOUNT TYPE

                </span>

                <h1>

                    Welcome Back

                </h1>

                <p>

                    Select your account type and sign in to continue.

                </p>

            </div>

            <!--=========================
            ROLE
            =========================-->

            <div class="role-selector">

                <div class="role-card active"
                    data-role="admin">

                    <i class="fa-solid fa-user-shield"></i>

                    <h3>

                        Admin

                    </h3>

                    <span>

                        Fleet & Operations

                    </span>

                </div>

                <div class="role-card"
                    data-role="client">

                    <i class="fa-solid fa-user"></i>

                    <h3>

                        Client

                    </h3>

                    <span>

                        Reports & Services

                    </span>

                </div>

            </div>

            <!--=========================
            FORM
            =========================-->

            <form id="loginForm" novalidate>

                <!-- Name -->

                <div class="input-group">

                    <label>

                        Full Name

                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-user"></i>

                        <input
                            type="text"
                            id="fullName"
                            placeholder="Your full name">

                    </div>

                    <small id="nameError"
                        class="error-text"></small>

                </div>

                <!-- Email -->

                <div class="input-group">

                    <label>

                        Email

                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="you@example.com">

                    </div>

                    <small id="emailError"
                        class="error-text"></small>

                </div>

                <!-- Password -->

                <div class="input-group">

                    <label>

                        Password

                    </label>

                    <div class="input-box password-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="At least 8 characters">

                        <span
                            class="toggle-password"
                            id="togglePassword">

                            <i class="fa-solid fa-eye-slash"></i>

                        </span>

                    </div>

                    <small id="passwordError"
                        class="error-text"></small>

                </div>

                <!-- Remember -->

                <div class="login-options">

                    <label class="remember-me">

                        <input
                            type="checkbox">

                        Remember Me

                    </label>

                    <a href="404.html">

                        Forgot Password?

                    </a>

                </div>

                <!-- Button -->

                <button
                    type="submit"
                    id="loginBtn"
                    class="login-btn">

                    <i class="fa-solid fa-right-to-bracket"></i>

                    Sign In

                </button>

            </form>

            <!--=========================
            REGISTER
            =========================-->

            <div class="register-text">

                Don't have an account?

                <a href="register.html">

                    Create One

                </a>

            </div>

            <!--=========================
            BACK
            =========================-->

            <a href="index.html"
                class="back-home">

                <i class="fa-solid fa-arrow-left"></i>

                Go Back

            </a>

        </div>

    </section>

    <script src="js/auth.js"></script>

</body>

</html>
